name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build (database + api + web)
        run: |
          pnpm --filter @worken/database build
          pnpm --filter api build
          pnpm --filter web build
        env:
          NEXT_PUBLIC_API_URL: ""

      - name: Test (api)
        run: pnpm --filter api test

      - name: Test (web)
        run: pnpm --filter web test
