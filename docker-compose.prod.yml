# Production compose — meant to live on the Contabo VPS at /srv/worken/.
# The `.env` next to this file is written by the GitHub Actions deploy
# workflow from repository secrets; do NOT commit it.
#
# Image tags are parameterised via ${IMAGE_TAG} so each deploy pins to the
# commit SHA, allowing instant rollback by editing one variable.

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - /srv/worken/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - worken

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - /srv/worken/redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - worken

  api:
    image: ghcr.io/${GH_OWNER}/worken-api:${IMAGE_TAG}
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /srv/worken/uploads:/app/apps/api/uploads
    networks:
      - worken

  web:
    image: ghcr.io/${GH_OWNER}/worken-web:${IMAGE_TAG}
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - api
    networks:
      - worken

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /srv/worken/Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/worken/caddy_data:/data
      - /srv/worken/caddy_config:/config
    depends_on:
      - web
      - api
    networks:
      - worken

networks:
  worken:
    driver: bridge
