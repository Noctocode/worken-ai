# Lock the Compose project name so the postgres + redis volumes keep a
# stable prefix regardless of what the working directory is called. By
# default Compose prefixes volume names with the project name, which
# defaults to the directory name — so renaming/cloning the repo into
# a differently-named directory silently creates EMPTY volumes and
# the dev DB looks wiped (login starts 500-ing because `users`
# doesn't exist on the new volume). Fixing the name here makes the
# behaviour identical no matter where the repo is checked out.
name: worken-ai

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: worken-postgres
    environment:
      POSTGRES_USER: worken
      POSTGRES_PASSWORD: worken
      POSTGRES_DB: worken
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worken -d worken"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: worken-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
